server_tokens off;
client_max_body_size 2500m;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_connect_timeout       600;
proxy_send_timeout          600;
proxy_read_timeout          600;
send_timeout                600;

# Rate limiting — exempt campus networks, limit everyone else
geo $rate_limit_group {
    default         external;

    # UCR
    138.23.0.0/16   exempt;
    169.235.0.0/16  exempt;

    # UCSD
    132.239.0.0/16  exempt;
    137.110.0.0/16  exempt;
    192.31.146.0/24 exempt;
}

# Map group to rate limit key: empty string = no limit, $binary_remote_addr = limited
map $rate_limit_group $rate_limit_key {
    exempt  "";
    default $binary_remote_addr;
}

# Blanket rate limit zone: 10 req/s per IP, 10MB shared memory for tracking
limit_req_zone $rate_limit_key zone=blanket:10m rate=10r/s;
limit_req zone=blanket burst=20 nodelay;
limit_req_status 429;
